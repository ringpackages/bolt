<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bolt App{% endblock %}</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface-glass: rgba(255, 255, 255, 0.04);
            --surface-card: rgba(255, 255, 255, 0.06);
            --surface-hover: rgba(255, 255, 255, 0.09);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --accent-hover: #818cf8;
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --error: #ef4444;
            --error-glow: rgba(239, 68, 68, 0.2);
            --warning: #f59e0b;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-lg: 24px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: Inter, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -20%, rgba(99, 102, 241, 0.12), transparent),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(16, 185, 129, 0.06), transparent);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 62px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .brand {
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            color: var(--text);
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav .brand::before {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-glow);
            display: inline-block;
        }

        nav .links {
            display: flex;
            gap: 2px;
        }

        nav .links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            transition: all var(--transition);
        }

        nav .links a:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.08);
        }

        .container {
            max-width: 920px;
            margin: 36px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--surface-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 18px;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
        }

        .card:hover {
            border-color: var(--glass-border-hover);
            background: var(--surface-hover);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        footer {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-secondary);
            font-size: 13px;
            border-top: 1px solid var(--glass-border);
            margin-top: 20px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.02em;
            backdrop-filter: blur(8px);
        }

        .badge-green {
            background: rgba(16, 185, 129, 0.12);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-red {
            background: rgba(239, 68, 68, 0.12);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .badge-blue {
            background: rgba(99, 102, 241, 0.12);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.6px;
            line-height: 1.2;
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        h3 {
            font-size: 16px;
            font-weight: 600;
        }

        input,
        textarea,
        select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            color: var(--text);
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        button {
            cursor: pointer;
            font-family: inherit;
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>
    <nav>
        <a href="/" class="brand">{% block brand %}Bolt Templates{% endblock %}</a>
        <div class="links">
            {% block nav_links %}
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/team">Team</a>
            <a href="/contact">Contact</a>
            {% endblock %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        {% block footer %}Powered by Bolt Framework{% endblock %}
    </footer>

    {% block scripts %}{% endblock %}
</body>

</html>
